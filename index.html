<!DOCTYPE html>
<html lang="en-GB">
<head>
    <title>Oubaitori Collective Blossom Trail</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* ===== UI FOUNDATIONS ===== */
        *, *::before, *::after { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; background: #000; color: #fff; }
        #app { display: flex; height: 100vh; width: 100vw; }

        /* ===== SIDEBAR ===== */
        #sidebar { 
            width: 380px; min-width: 380px; height: 100vh; background: #000; 
            overflow-y: auto; padding: 25px; border-right: 1px solid #222; z-index: 10; 
        }
        h1 { font-size: 1.4em; margin: 0 0 10px; border-bottom: 2px solid #d81b60; padding-bottom: 10px; text-transform: uppercase; line-height: 1.2; }
        .sidebar-image { width: 100%; height: 160px; border-radius: 8px; margin-bottom: 15px; object-fit: cover; border: 1px solid #333; }
        .description { font-size: 0.85em; line-height: 1.5; color: #ccc; margin-bottom: 20px; font-style: italic; border-left: 3px solid #d81b60; padding-left: 15px; }

        /* ===== ACCORDION SYSTEM ===== */
        .bucket { margin-bottom: 12px; border: 1px solid #222; border-radius: 8px; overflow: hidden; }
        .bucket-header { background: #111; padding: 12px 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        .bucket-header:hover { background: #1a1a1a; }
        .bucket-header strong { font-size: 0.8em; text-transform: uppercase; letter-spacing: 1px; }
        .bucket-content { display: none; padding: 15px; background: #050505; border-top: 1px solid #222; }
        .bucket.active .bucket-content { display: block; }
        .bucket.active .bucket-header { background: #1a1a1a; border-bottom: 1px solid #d81b60; }

        /* Accessibility Special Styling */
        .a11y-header strong { color: #fff; } /* Keep A11Y distinct */
        .stage-header strong { color: #d81b60; }
        
        /* A11Y Internal Layout */
        .a11y-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .a11y-btn { padding: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 6px; cursor: pointer; font-size: 0.75em; text-align: center; text-decoration: none; }
        .a11y-btn:hover { background: #333; }
        .radar-btn { grid-column: span 2; background: #00c853; color: #000; font-weight: bold; border: none; }

        /* ===== SITE LINKS ===== */
        .site-link { display: block; padding: 10px; margin-bottom: 6px; background: #111; border-radius: 6px; cursor: pointer; border-left: 0px solid #d81b60; transition: 0.15s; font-size: 0.85em; color: #fff; text-decoration: none; }
        .site-link:hover { background: #222; border-left-width: 5px; }

        /* ===== MAP ===== */
        #map { flex-grow: 1; height: 100vh; background: #111; z-index: 1; }
        #recenter-btn { position: fixed; bottom: 30px; right: 20px; z-index: 1000; padding: 12px 20px; background: #d81b60; color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        /* A11Y MODES */
        body.high-contrast { background: #000; }
        body.high-contrast .bucket { border-color: #fff; }
        body.dyslexia-font { font-family: 'Verdana', sans-serif; letter-spacing: 0.05em; line-height: 1.6; }

        @media (max-width: 768px) {
            #app { flex-direction: column; }
            #sidebar { width: 100%; height: 50vh; min-width: auto; }
            #map { height: 50vh; }
        }
    </style>
</head>
<body>

<div id="app">
    <nav id="sidebar">
        <h1>Oubaitori Collective Blossom Trail</h1>
        
        <div class="description">
            桜梅桃李 (Oubaitori): Just as the Cherry, Plum, Peach, and Apricot bloom in their own time, each journey is unique.
        </div>

        <img src="blossom.jpg" alt="Blossom Trail" class="sidebar-image">

        <div class="bucket a11y-bucket" id="bucket-a11y">
            <div class="bucket-header a11y-header" onclick="toggleBucket('a11y')">
                <strong>⚙️ Accessibility Options</strong>
                <span>▼</span>
            </div>
            <div class="bucket-content">
                <div class="a11y-grid">
                    <button class="a11y-btn" onclick="document.body.classList.toggle('high-contrast')">High Contrast</button>
                    <button class="a11y-btn" onclick="document.body.classList.toggle('dyslexia-font')">Dyslexia Font</button>
                    <a href="https://999bsl.co.uk" target="_blank" class="a11y-btn" style="background:#d81b60">🤟 999 BSL</a>
                    <a href="https://emergencysms.net" target="_blank" class="a11y-btn">📱 Text 999</a>
                    <button class="a11y-btn radar-btn" id="radar-toggle">🔑 Show RADAR Toilets</button>
                </div>
            </div>
        </div>

        <div class="bucket active" id="bucket-1">
            <div class="bucket-header stage-header" onclick="toggleBucket(1)"><strong>Stage 1: Reset</strong><span>▼</span></div>
            <div class="bucket-content"><div id="list-1"></div></div>
        </div>
        <div class="bucket" id="bucket-2">
            <div class="bucket-header stage-header" onclick="toggleBucket(2)"><strong>Stage 2: Expansion</strong><span>▼</span></div>
            <div class="bucket-content"><div id="list-2"></div></div>
        </div>
        <div class="bucket" id="bucket-3">
            <div class="bucket-header stage-header" onclick="toggleBucket(3)"><strong>Stage 3: Flow</strong><span>▼</span></div>
            <div class="bucket-content"><div id="list-3"></div></div>
        </div>
        <div class="bucket" id="bucket-4">
            <div class="bucket-header stage-header" onclick="toggleBucket(4)"><strong>Stage 4: Connection</strong><span>▼</span></div>
            <div class="bucket-content"><div id="list-4"></div></div>
        </div>
        <div class="bucket" id="bucket-5">
            <div class="bucket-header stage-header" onclick="toggleBucket(5)"><strong>Stage 5: Breath</strong><span>▼</span></div>
            <div class="bucket-content"><div id="list-5"></div></div>
        </div>
    </nav>
    <div id="map"></div>
</div>

<button id="recenter-btn">📍 Recenter on Van</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
function toggleBucket(id) {
    var target = document.getElementById('bucket-' + id);
    var wasActive = target.classList.contains('active');
    // If opening a stage, close others. If opening A11Y, keep others (to allow tweaking while viewing list).
    if(typeof id === 'number') {
        document.querySelectorAll('.bucket:not(.a11y-bucket)').forEach(b => b.classList.remove('active'));
    }
    target.classList.toggle('active', !wasActive);
}

(function () {
    var map = L.map('map').setView([54.843, -1.470], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap' }).addTo(map);

    var blossomIcon = L.icon({ iconUrl: 'blossom1.svg', iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -30] });

    var sites = [
        { name: "Houghton-le-Spring", stage: 1, lat: 54.8432, lon: -1.4707, type: "blossom" },
        { name: "Washington Old Hall", stage: 2, lat: 54.9027, lon: -1.5165, type: "blossom" },
        { name: "Durham City", stage: 2, lat: 54.773, lon: -1.576, type: "landmark" },
        { name: "Angel of the North", stage: 3, lat: 54.9141, lon: -1.5895, type: "landmark" },
        { name: "Jesmond Dene", stage: 4, lat: 54.9900, lon: -1.5900, type: "blossom" },
        { name: "Bamburgh Castle", stage: 5, lat: 55.6089, lon: -1.7099, type: "landmark" }
    ];

    var markerGroup = L.featureGroup();
    var trailCoords = [];

    sites.forEach(function(s) {
        var icon = (s.type === "blossom") ? blossomIcon : new L.Icon.Default();
        var m = L.marker([s.lat, s.lon], {icon: icon}).addTo(markerGroup);
        m.bindPopup(`<strong>${s.name}</strong>`);
        trailCoords.push([s.lat, s.lon]);

        var list = document.getElementById('list-' + s.stage);
        if(list) {
            var link = document.createElement('div');
            link.className = 'site-link';
            link.textContent = s.name;
            link.onclick = function() { map.flyTo([s.lat, s.lon], 14); m.openPopup(); };
            list.appendChild(link);
        }
    });

    markerGroup.addTo(map);
    L.polyline(trailCoords, {color: '#d81b60', weight: 3, opacity: 0.5, dashArray: '8, 12'}).addTo(map);
    map.fitBounds(markerGroup.getBounds().pad(0.1));

    var vanMarker = L.marker([54.842, -1.468], {icon: L.icon({ iconUrl: 'test-van.svg', iconSize: [44, 44] })}).addTo(map);
    document.getElementById('recenter-btn').onclick = function() { map.setView(vanMarker.getLatLng(), 15); };
})();
</script>
</body>
</html>
