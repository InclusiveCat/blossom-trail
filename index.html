<!DOCTYPE html>
<html lang="en-GB">
<head>
    <title>Oubaitori Collective Blossom Trail</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* ===== UI FOUNDATIONS ===== */
        *, *::before, *::after { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; background: #000; color: #fff; }
        #app { display: flex; height: 100vh; width: 100vw; }

        /* ===== SIDEBAR ===== */
        #sidebar { 
            width: 380px; min-width: 380px; height: 100vh; background: #000; 
            overflow-y: auto; padding: 25px; border-right: 1px solid #222; z-index: 200; 
        }
        #sidebar::-webkit-scrollbar { width: 4px; }
        #sidebar::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

        /* ===== ACCORDION LOGIC ===== */
        .stage-bucket { margin-bottom: 12px; border: 1px solid #222; border-radius: 8px; overflow: hidden; }
        .stage-header { 
            background: #111; padding: 15px; cursor: pointer; display: flex; 
            justify-content: space-between; align-items: center; transition: background 0.2s;
        }
        .stage-header:hover { background: #1a1a1a; }
        .stage-header strong { color: #d81b60; font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px; }
        .stage-content { display: none; padding: 10px; background: #050505; border-top: 1px solid #222; }
        .stage-bucket.active .stage-content { display: block; }
        .stage-icon { font-size: 0.8em; transition: transform 0.3s; color: #888; }
        .stage-bucket.active .stage-icon { transform: rotate(180deg); }

        /* ===== SITE LINKS ===== */
        .site-link { 
            display: block; padding: 12px; margin-bottom: 6px; background: #111; 
            border-radius: 6px; cursor: pointer; border-left: 0px solid #d81b60; transition: 0.15s;
        }
        .site-link:hover { background: #222; border-left-width: 5px; }
        .site-name { font-weight: bold; display: block; font-size: 0.9em; margin-bottom: 3px; }
        .site-meta { font-size: 0.72em; color: #888; line-height: 1.3; }
        .tag-moon { color: #d81b60; }

        /* ===== UI ELEMENTS ===== */
        h1 { font-size: 1.4em; margin: 0 0 10px; border-bottom: 2px solid #d81b60; padding-bottom: 10px; text-transform: uppercase; }
        .signature-msg { color: #ccc; font-style: italic; font-size: 0.85em; margin-bottom: 20px; border-left: 3px solid #d81b60; padding-left: 15px; line-height: 1.4; }
        #map { flex-grow: 1; height: 100vh; background: #111; }
        .popup-img { width: 100%; border-radius: 4px; margin-top: 8px; }
        #recenter-btn { position: fixed; bottom: 30px; right: 30px; z-index: 1000; padding: 12px 20px; background: #d81b60; color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            #app { flex-direction: column; }
            #sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #222; min-width: auto; max-height: 50vh; }
            #map { height: 50vh; }
        }
    </style>
</head>
<body>

<div id="app">
    <nav id="sidebar">
        <h1>Oubaitori Trail</h1>
        <div class="signature-msg">Anchor at Houghton-le-Spring. Explore at your own pace.</div>
        
        <div class="stage-bucket active" id="bucket-1">
            <div class="stage-header" onclick="toggleBucket(1)">
                <strong>Stage 1: Reset (The Anchor)</strong>
                <span class="stage-icon">▼</span>
            </div>
            <div class="stage-content" id="list-1"></div>
        </div>

        <div class="stage-bucket" id="bucket-2">
            <div class="stage-header" onclick="toggleBucket(2)">
                <strong>Stage 2: Expansion</strong>
                <span class="stage-icon">▼</span>
            </div>
            <div class="stage-content" id="list-2"></div>
        </div>

        <div class="stage-bucket" id="bucket-3">
            <div class="stage-header" onclick="toggleBucket(3)">
                <strong>Stage 3: Flow</strong>
                <span class="stage-icon">▼</span>
            </div>
            <div class="stage-content" id="list-3"></div>
        </div>

        <div class="stage-bucket" id="bucket-4">
            <div class="stage-header" onclick="toggleBucket(4)">
                <strong>Stage 4: Connection</strong>
                <span class="stage-icon">▼</span>
            </div>
            <div class="stage-content" id="list-4"></div>
        </div>

        <div class="stage-bucket" id="bucket-5">
            <div class="stage-header" onclick="toggleBucket(5)">
                <strong>Stage 5: Breath</strong>
                <span class="stage-icon">▼</span>
            </div>
            <div class="stage-content" id="list-5"></div>
        </div>
    </nav>
    <div id="map"></div>
</div>

<button id="recenter-btn">📍 Recenter on Van</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// Accordion Toggle Function
function toggleBucket(id) {
    document.querySelectorAll('.stage-bucket').forEach(b => b.classList.remove('active'));
    document.getElementById('bucket-' + id).classList.add('active');
}

(function () {
    var map = L.map('map').setView([54.843, -1.470], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    var blossomIcon = L.icon({ iconUrl: 'blossom1.svg', iconSize: [30, 30], iconAnchor: [15, 30], popupAnchor: [0, -25] });
    var vanIcon = L.icon({ iconUrl: 'test-van.svg', iconSize: [40, 40], iconAnchor: [20, 20] });

    // Organized Site Data
    var sites = [
        { name: "Houghton-le-Spring", stage: 1, lat: 54.8432, lon: -1.4707, img: "white-harmony.jpg", sensory: "🤫 Quiet Anchor", moon: "⭐ High Visibility" },
        
        { name: "Washington Old Hall", stage: 2, lat: 54.9027, lon: -1.5165, img: "washington.jpg", sensory: "🧘 Enclosed", moon: "🌙 Garden Shadows" },
        { name: "Durham City", stage: 2, lat: 54.773, lon: -1.576, img: "durham.jpg", sensory: "🚶 Structured", moon: "🌙 Cathedral Glow" },
        { name: "Old Durham Gardens", stage: 2, lat: 54.773, lon: -1.558, img: "old-durham.jpg", sensory: "🤫 Stillness", moon: "⭐ Clear Sky" },
        { name: "Preston Park", stage: 2, lat: 54.5360, lon: -1.3370, img: "preston.jpg", sensory: "🚶 Level Ground", moon: "🌙 Wide View" },
        { name: "Ormesby Hall", stage: 2, lat: 54.5432, lon: -1.1830, img: "ormesby.jpg", sensory: "🤫 Silent", moon: "🌙 Stately" },

        { name: "Angel of the North", stage: 3, lat: 54.9141, lon: -1.5895, img: "angel.jpg", sensory: "🌬️ Exposed/Active", moon: "⭐ Silhouette" },
        { name: "Seaham Coast", stage: 3, lat: 54.823, lon: -1.3189, img: "seaham.jpg", sensory: "🌊 Sound of Waves", moon: "🌙 Water Reflection" },
        { name: "Roker Pier", stage: 3, lat: 54.924, lon: -1.365, img: "roker.jpg", sensory: "🌊 High Sensory", moon: "🌙 Lighthouse" },
        { name: "South Marine Park", stage: 3, lat: 55.0001, lon: -1.4202, img: "south-marine.jpg", sensory: "🚶 Dynamic", moon: "⭐ Bright" },

        { name: "Jesmond Dene", stage: 4, lat: 54.9900, lon: -1.5900, img: "jesmond.jpg", sensory: "🌳 Nature Sanctuary", moon: "🌑 Dappled Light" },
        { name: "Tyne Bridge", stage: 4, lat: 54.968, lon: -1.606, img: "tyne-bridge.jpg", sensory: "🏙️ Urban Hum", moon: "🏙️ City Lights" },
        { name: "Alnwick Garden", stage: 4, lat: 55.4155, lon: -1.7060, img: "alnwick.jpg", sensory: "🚶 High Activity", moon: "🌙 Lit Paths" },
        { name: "Castle Eden Dene", stage: 4, lat: 54.7500, lon: -1.3263, img: "castle-eden.jpg", sensory: "🌳 Deep Forest", moon: "🌑 Deep Dark" },

        { name: "Gibside", stage: 5, lat: 54.9245, lon: -1.7267, img: "gibside.jpg", sensory: "🌳 Wide Vistas", moon: "⭐ Dark Sky" },
        { name: "Whitley Lodge", stage: 5, lat: 55.0501, lon: -1.4510, img: "whitley.jpg", sensory: "🌊 Brisk Sea Air", moon: "🌙 Horizon" },
        { name: "Saltburn Pier", stage: 5, lat: 54.586, lon: -0.978, img: "saltburn.jpg", sensory: "🌊 Cliffs/Waves", moon: "🌙 Dramatic" },
        { name: "Hadrian's Wall", stage: 5, lat: 55.002, lon: -2.360, img: "hadrian.jpg", sensory: "🌬️ Wild/Free", moon: "⭐ Stargazing" },
        { name: "Bamburgh Castle", stage: 5, lat: 55.6089, lon: -1.7099, img: "bamburgh.jpg", sensory: "🌊 Expansive", moon: "⭐ Stark" }
    ];

    var markerGroup = L.featureGroup();
    var trailCoords = [];

    sites.forEach(function(s) {
        // Add to Map
        var m = L.marker([s.lat, s.lon], {icon: blossomIcon}).addTo(markerGroup);
        m.bindPopup(`<strong>${s.name}</strong><br><span class="tag-moon">${s.moon}</span><img src='${s.img}' class='popup-img'>`);
        trailCoords.push([s.lat, s.lon]);

        // Add to Accordion
        var list = document.getElementById('list-' + s.stage);
        var link = document.createElement('div');
        link.className = 'site-link';
        link.innerHTML = `
            <span class="site-name">${s.name}</span>
            <span class="site-meta">${s.sensory} | <span class="tag-moon">${s.moon}</span></span>
        `;
        link.onclick = function() {
            map.flyTo([s.lat, s.lon], 14);
            m.openPopup();
        };
        list.appendChild(link);
    });

    markerGroup.addTo(map);
    L.polyline(trailCoords, {color: '#d81b60', weight: 2, opacity: 0.3, dashArray: '5, 10'}).addTo(map);
    map.fitBounds(markerGroup.getBounds().pad(0.1));

    // Van Tracker
    var vanMarker = L.marker([54.842, -1.468], {icon: vanIcon}).addTo(map);
    document.getElementById('recenter-btn').onclick = function() { map.setView(vanMarker.getLatLng(), 15); };
})();
</script>
</body>
</html>
