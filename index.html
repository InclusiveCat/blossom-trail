<!DOCTYPE html>
<html>
<head>
    <title>North East Blossom & Landmark Trail</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* CSS FIX: Forces light mode and removes all black/dark filters */
        body, html, #map { margin: 0; padding: 0; height: 100vh; width: 100vw; background: white !important; filter: none !important; }
        .leaflet-container { background: #fff !important; filter: none !important; }
        .popup-img { width: 100%; height: auto; border-radius: 5px; margin-top: 5px; }
        h3 { margin: 0; color: #d81b60; font-family: sans-serif; }
    </style>
</head>
<body>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map');
    
    // Light-themed OpenStreetMap Tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // LANDMARKS & SITES ARRAY
    var sites = [
        { name: "Alnwick Garden", lat: 55.4155, lon: -1.7060, img: "alnwick.jpg" },
        { name: "Angel of the North", lat: 54.9141, lon: -1.5895, img: "angel.jpg" },
        { name: "Bamburgh Castle", lat: 55.6089, lon: -1.7099, img: "bamburgh.jpg" },
        { name: "Durham City", lat: 54.773, lon: -1.576, img: "durham.jpg" },
        { name: "Gibside", lat: 54.9245, lon: -1.7267, img: "gibside.jpg" },
        { name: "Hadrian's Wall", lat: 55.002, lon: -2.360, img: "hadrian.jpg" },
        { name: "Houghton-le-Spring", lat: 54.842, lon: -1.468, img: "houghton.jpg" },
        { name: "Jesmond Dene", lat: 54.9900, lon: -1.5900, img: "jesmond.jpg" },
        { name: "Old Durham Gardens", lat: 54.773, lon: -1.558, img: "old-durham.jpg" },
        { name: "Ormesby Hall", lat: 54.5432, lon: -1.1830, img: "ormesby.jpg" },
        { name: "Preston Park", lat: 54.5360, lon: -1.3370, img: "preston.jpg" },
        { name: "Roker Pier", lat: 54.924, lon: -1.365, img: "roker.jpg" },
        { name: "Saltburn Pier", lat: 54.586, lon: -0.978, img: "saltburn.jpg" },
        { name: "South Marine Park", lat: 55.0001, lon: -1.4202, img: "south-marine.jpg" },
        { name: "Tyne Bridge", lat: 54.968, lon: -1.606, img: "tyne-bridge.jpg" },
        { name: "Washington Old Hall", lat: 54.9027, lon: -1.5165, img: "washington.jpg" },
        { name: "Whitley Lodge", lat: 55.0501, lon: -1.4510, img: "whitley.jpg" }
        
        /* COMMENTED OUT SITES AS REQUESTED:
        { name: "Crook Hall", lat: 54.7825, lon: -1.5747, img: "blossom1.svg" },
        { name: "South Park", lat: 54.5133, lon: -1.5530, img: "blossom1.svg" },
        { name: "Burn Valley", lat: 54.6800, lon: -1.2300, img: "blossom1.svg" },
        { name: "Flatts Lane", lat: 54.5430, lon: -1.1560, img: "blossom1.svg" }
        */
    ];

    var markerGroup = L.featureGroup();
    sites.forEach(function(s) {
        var content = "<h3>" + s.name + "</h3><img src='" + s.img + "' class='popup-img'>";
        L.marker([s.lat, s.lon]).bindPopup(content).addTo(markerGroup);
    });
    markerGroup.addTo(map);

    // Automatically zoom to show all active markers
    map.fitBounds(markerGroup.getBounds().pad(0.1));

    // LIVE VAN TRACKER using local test-van.svg
    var vanIcon = L.icon({ iconUrl: 'test-van.svg', iconSize: [50, 50], iconAnchor: [25, 25] });
    var vanMarker = L.marker([54.95, -1.6], {icon: vanIcon}).addTo(map);

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(function(pos) {
            vanMarker.setLatLng([pos.coords.latitude, pos.coords.longitude]);
        }, null, { enableHighAccuracy: true });
    }
</script>
</body>
</html>
