<!DOCTYPE html>
<html>
<head>
    <title>Oubaitori Collective Blossom Trail</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; }
        .popup-header { color: #d81b60; font-weight: bold; }
    </style>
</head>
<body>
    <div id="map"></div>
    <!-- Include Leaflet and the Rotation Plugin -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-rotatedmarker@0.2.0/leaflet.rotatedMarker.min.js"></script>
    
    <script>
        // 1. Setup Map
        var map = L.map('map').setView([54.95, -1.6], 9);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 2. Define Custom Icons
        var vanIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/InclusiveCat/blossom-trail/main/test-van.svg', 
            iconSize: [60, 60], 
            iconAnchor: [30, 30] // Center point for rotation
        });

        var blossomIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/InclusiveCat/blossom-trail/main/blossom1.svg',
            iconSize: [45, 45], iconAnchor: [22, 45], popupAnchor: [0, -40]
        });

        // 3. Complete List of 20 Points
        var points = [
            {n:"Angel of the North", lat:54.9141, lon:-1.5895, type:"Landmark"},
            {n:"Durham Cathedral", lat:54.7736, lon:-1.5762, type:"Landmark"},
            {n:"Hadrian's Wall", lat:55.0130, lon:-2.3310, type:"Landmark"},
            {n:"Bamburgh Castle", lat:55.6086, lon:-1.7090, type:"Landmark"},
            {n:"Penshaw Monument", lat:54.8860, lon:-1.4793, type:"Landmark"},
            {n:"Tyne Bridge", lat:54.9697, lon:-1.6025, type:"Landmark"},
            {n:"Saltburn Pier", lat:54.5820, lon:-0.9730, type:"Landmark"},
            {n:"Roker Pier & Lighthouse", lat:54.9184, lon:-1.3645, type:"Landmark"},
            {n:"Alnwick Garden", lat:55.4155, lon:-1.7060, type:"Blossom"},
            {n:"Jesmond Dene", lat:54.9900, lon:-1.5900, type:"Blossom"},
            {n:"Gibside", lat:54.9245, lon:-1.7267, type:"Blossom"},
            {n:"Whitley Lodge (Pink Street)", lat:55.0501, lon:-1.451, type:"Blossom"},
            {n:"South Marine Park", lat:55.0001, lon:-1.4202, type:"Blossom"},
            {n:"Washington Old Hall", lat:54.9027, lon:-1.5165, type:"Blossom"},
            {n:"Crook Hall Gardens", lat:54.7825, lon:-1.5747, type:"Blossom"},
            {n:"South Park", lat:54.5133, lon:-1.5530, type:"Blossom"},
            {n:"Burn Valley Gardens", lat:54.6800, lon:-1.2300, type:"Blossom"},
            {n:"Preston Park", lat:54.5360, lon:-1.3370, type:"Blossom"},
            {n:"Ormesby Hall", lat:54.5432, lon:-1.1830, type:"Blossom"},
            {n:"Flatts Lane Woodland", lat:54.5430, lon:-1.1560, type:"Blossom"}   
        ];

        // 4. Draw the Visual Trail (Polyline)
        var pathCoords = points.map(p => [p.lat, p.lon]);
        L.polyline(pathCoords, {color: '#d81b60', weight: 3, opacity: 0.5, dashArray: '10, 10'}).addTo(map);

        // 5. Render Markers
        points.forEach(p => {
            var activeIcon = (p.type === "Blossom") ? blossomIcon : new L.Icon.Default();
            L.marker([p.lat, p.lon], {icon: activeIcon}).addTo(map)
             .bindPopup("<div class='popup-header'>" + p.n + "</div>Category: " + p.type);
        });

        // 6. Bearing Function (Calculates Rotation Angle)
        function getBearing(lat1, lon1, lat2, lon2) {
            const y = Math.sin(lon2 - lon1) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(lon2 - lon1);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        // 7. Live Van Tracking with Rotation
        var vanMarker = L.marker([54.95, -1.6], {
            icon: vanIcon, 
            zIndexOffset: 1000,
            rotationAngle: 0,
            rotationOrigin: 'center center'
        }).addTo(map);

        var prevPos = null;

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(function(pos) {
                var lat = pos.coords.latitude;
                var lon = pos.coords.longitude;

                if (prevPos) {
                    var angle = getBearing(prevPos.lat, prevPos.lon, lat, lon);
                    // Use the heading provided by GPS if available, otherwise calculate it
                    var heading = pos.coords.heading || angle; 
                    vanMarker.setRotationAngle(heading);
                }

                vanMarker.setLatLng([lat, lon]);
                map.panTo([lat, lon]);
                prevPos = {lat: lat, lon: lon};
            }, null, {enableHighAccuracy: true});
        }
    </script>
</body>
</html>
