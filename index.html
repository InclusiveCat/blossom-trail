<!DOCTYPE html>
<html>
<head>
    <title>Oubaitori Collective Blossom Trail</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        body { margin: 0; }
        .popup-header { color: #d81b60; font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .popup-img { width: 100%; height: auto; border-radius: 4px; margin-top: 5px; }
        .leaflet-popup-content { width: 220px !important; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-rotatedmarker@0.2.0/leaflet.rotatedMarker.min.js"></script>
    
    <script>
        var map = L.map('map').setView([54.95, -1.6], 9);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var vanIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/InclusiveCat/blossom-trail/main/test-van.svg', 
            iconSize: [60, 60], iconAnchor: [30, 30]
        });

        var blossomIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/InclusiveCat/blossom-trail/main/blossom1.svg',
            iconSize: [45, 45], iconAnchor: [22, 45], popupAnchor: [0, -40]
        });

        // Points array updated with high-quality image URLs
        var points = [
            {n:"Angel of the North", lat:54.9141, lon:-1.5895, type:"Landmark", img:"https://upload.wikimedia.org/wikipedia/commons/9/93/Angel_of_the_North_2010.jpg"},
            {n:"Durham Cathedral", lat:54.7736, lon:-1.5762, type:"Landmark", img:"https://images.squarespace-cdn.com/content/v1/63fca62b56b5163006e07af5/1679340787828-OVSBKFBL9C525C6WOYBR/Durham+Night+D+04+copy.jpg"},
            {n:"Hadrian's Wall", lat:55.0130, lon:-2.3310, type:"Landmark", img:"https://geographical.co.uk/wp-content/uploads/hadrians-wall-1.webp"},
            {n:"Bamburgh Castle", lat:55.6086, lon:-1.7090, type:"Landmark", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1b/Bamburgh_Castle_from_beach.jpg/1200px-Bamburgh_Castle_from_beach.jpg"},
            {n:"Penshaw Monument", lat:54.8860, lon:-1.4793, type:"Landmark", img:"https://upload.wikimedia.org/wikipedia/commons/1/17/Steps_to_the_Penshaw_Monument_%28geograph_5719013%29.jpg"},
            {n:"Tyne Bridge", lat:54.9697, lon:-1.6025, type:"Landmark", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/Tyne_Bridge_from_Quayside.jpg/1200px-Tyne_Bridge_from_Quayside.jpg"},
            {n:"Saltburn Pier", lat:54.5820, lon:-0.9730, type:"Landmark", img:"https://cdn.thenorthyorkshiregallery.co.uk/2022/06/Saltburn-Pier-Solstice.jpg"},
            {n:"Roker Pier & Lighthouse", lat:54.9184, lon:-1.3645, type:"Landmark", img:"https://cdn.fabulousnorth.com/fabulous-north/place/12a-2403359dd9a.jpg"},
            {n:"Alnwick Garden", lat:55.4155, lon:-1.7060, type:"Blossom", img:"https://images.squarespace-cdn.com/content/v1/606de2f5ee6e3a34c8370f15/3698bed0-872b-4b52-935a-a2200710a762/270A4252.jpg"},
            {n:"Jesmond Dene", lat:54.9900, lon:-1.5900, type:"Blossom", img:"https://c8.alamy.com/comp/AHB5A2/springtime-in-jesmond-dene-newcastle-upon-tyne-tyne-and-wear-england-AHB5A2.jpg"},
            {n:"Gibside", lat:54.9245, lon:-1.7267, type:"Blossom", img:"https://nt.global.ssl.fastly.net/binaries/content/gallery/website/national/regions/north-east/places/gibside/library/spring/blossom/1738144.crop.jpg"},
            {n:"Whitley Lodge (Pink Street)", lat:55.0501, lon:-1.451, type:"Blossom", img:"https://c8.alamy.com/comp/2PYMCTT/the-pink-cherry-blossom-in-bloom-in-whitley-lodge-area-of-whitley-bay-in-north-tyneside-2PYMCTT.jpg"},
            {n:"South Marine Park", lat:55.0001, lon:-1.4202, type:"Blossom", img:"https://c8.alamy.com/comp/2R1XPJY/bandstand-in-south-marine-park-south-shields-2R1XPJY.jpg"},
            {n:"Washington Old Hall", lat:54.9027, lon:-1.5165, type:"Blossom", img:"https://nt.global.ssl.fastly.net/binaries/content/gallery/website/national/regions/north-east/places/washington-old-hall/library/spring/washington-old-hall-gardens-in-may-north-east.jpg"},
            {n:"Crook Hall Gardens", lat:54.7825, lon:-1.5747, type:"Blossom", img:"https://nt.global.ssl.fastly.net/binaries/content/gallery/website/national/regions/north-east/places/crook-hall-gardens/library/spring/crook-hall-gardens-apple-blossom-north-east-alison-elrick.jpg"},
            {n:"South Park", lat:54.5133, lon:-1.5530, type:"Blossom", img:"https://southparkfoundation.org.uk/wp-content/uploads/2021/04/clocktower.jpg"},
            {n:"Burn Valley Gardens", lat:54.6800, lon:-1.2300, type:"Blossom", img:"https://lookaside.fbsbx.com/lookaside/crawler/media/?media_id=26041720305511724"},
            {n:"Preston Park", lat:54.5360, lon:-1.3370, type:"Blossom", img:"https://lookaside.fbsbx.com/lookaside/crawler/media/?media_id=1459625809119475"},
            {n:"Ormesby Hall", lat:54.5432, lon:-1.1830, type:"Blossom", img:"https://nt.global.ssl.fastly.net/binaries/content/gallery/website/national/regions/north-east/places/ormesby-hall/library/spring/blossom-at-ormesby-hall-north-yorkshire-1622549.jpg"},
            {n:"Flatts Lane Woodland", lat:54.5430, lon:-1.1560, type:"Blossom", img:"https://lookaside.fbsbx.com/lookaside/crawler/media/?media_id=1383446827147218"}
        ];

        // Draw the Visual Trail
        var pathCoords = points.map(p => [p.lat, p.lon]);
        L.polyline(pathCoords, {color: '#d81b60', weight: 3, opacity: 0.5, dashArray: '10, 10'}).addTo(map);

        // Updated Marker Rendering with Image Popups
        points.forEach(p => {
            var activeIcon = (p.type === "Blossom") ? blossomIcon : new L.Icon.Default();
            var popupContent = `
                <div class='popup-header'>${p.n}</div>
                Category: ${p.type}<br>
                <img src='${p.img}' class='popup-img' alt='${p.n}'>
            `;
            L.marker([p.lat, p.lon], {icon: activeIcon}).addTo(map)
             .bindPopup(popupContent);
        });

        // Van Bearing and GPS Tracking logic remains the same
        function getBearing(lat1, lon1, lat2, lon2) {
            const y = Math.sin(lon2 - lon1) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(lon2 - lon1);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        var vanMarker = L.marker([54.95, -1.6], {icon: vanIcon, zIndexOffset: 1000}).addTo(map);
        var prevPos = null;

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(function(pos) {
                var lat = pos.coords.latitude;
                var lon = pos.coords.longitude;
                if (prevPos) {
                    var heading = pos.coords.heading || getBearing(prevPos.lat, prevPos.lon, lat, lon); 
                    vanMarker.setRotationAngle(heading);
                }
                vanMarker.setLatLng([lat, lon]);
                map.panTo([lat, lon]);
                prevPos = {lat: lat, lon: lon};
            }, null, {enableHighAccuracy: true});
        }
    </script>
</body>
</html>
