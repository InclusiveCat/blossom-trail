<!DOCTYPE html>
<html lang="en-GB">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="app.title">Oubaitori Collective – Website Coming Soon</title>

    <!-- Core CSS -->
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/accessibility.css">

    <style>
        .container {
            display: flex;
            max-width: 1100px;
            width: 90%;
            align-items: center;
            gap: 60px;
            padding: 40px 0;
            margin: 0 auto;
            min-height: 100vh;
        }

        .left {
            flex: 1;
        }

        h1 {
            font-size: 48px;
            margin: 0 0 20px 0;
            line-height: 1.1;
            color: var(--deep-purple);
        }

        p {
            font-size: 20px;
            margin: 0 0 30px 0;
            max-width: 520px;
            color: var(--dark);
        }

        .right {
            flex: 1;
            text-align: center;
        }

        .logo {
            max-width: 480px;
            width: 100%;
        }

        @media (max-width: 800px) {
            .container {
                flex-direction: column;
                text-align: center;
                gap: 40px;
                padding-top: 80px;
            }
            h1 { font-size: 40px; }
            p {
                font-size: 18px;
                margin: 0 auto 30px auto;
            }
        }
    </style>
</head>

<body>
    <!-- Skip Link -->
    <a href="#main-content" class="skip-link" data-i18n="app.skipToMain">Skip to main content</a>

    <header hidden>
        <!-- Semantic header (hidden visually if not needed, or we can just leave it out if the whole page is main content) -->
        <h2>Oubaitori Collective</h2>
    </header>

    <main id="main-content" role="main">
        <div class="container">
            <div class="left">
                <h1 data-i18n="app.title">Oubaitori Collective</h1>

                <p>
                    Our website is coming soon.
                    In the meantime, you can help shape our service design by joining us on the Blossom Trail and completing
                    a short survey.
                </p>

                <a class="btn btn-primary" href="map.html" data-i18n="nav.startSurvey">
                    Oubaitori Collective Blossom Trail
                </a>
            </div>

            <div class="right">
                <img src="logo.png" alt="Oubaitori Collective Logo" class="logo">
            </div>
        </div>
    </main>

    <footer hidden>
        <p>&copy; 2026 Oubaitori Collective</p>
    </footer>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/accessibility.js"></script>
    <script src="js/i18n.js"></script>
</body>

</html>
