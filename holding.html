<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oubaitori Collective – Website Coming Soon</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #FAF7F2;
            /* Cloud Linen */
            font-family: Arial, sans-serif;
            color: #3B224C;
            /* Deepest Purple */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            max-width: 1100px;
            width: 90%;
            align-items: center;
            gap: 60px;
            padding: 40px 0;
        }

        .left {
            flex: 1;
        }

        h1 {
            font-size: 48px;
            margin: 0 0 20px 0;
            line-height: 1.1;
        }

        p {
            font-size: 20px;
            margin: 0 0 30px 0;
            max-width: 520px;
        }

        .cta-button {
            background: #3B224C;
            /* Deepest Purple */
            color: #FAF7F2;
            /* Cloud Linen */
            padding: 14px 28px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 18px;
            display: inline-block;
        }

        .cta-button:hover {
            background: #A57BB8;
            /* Soft Orchid */
        }

        .right {
            flex: 1;
            text-align: center;
        }

        .logo {
            max-width: 480px;
            /* increased size */
            width: 100%;
        }

        @media (max-width: 800px) {
            .container {
                flex-direction: column;
                text-align: center;
                gap: 40px;
            }

            h1 {
                font-size: 40px;
            }

            p {
                font-size: 18px;
                margin: 0 auto 30px auto;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="left">
            <h1>Oubaitori Collective</h1>

            <p>
                Our website is coming soon.
                In the meantime, you can help shape our service design by joining us on the Blossom Trail and completing
                a short survey.
            </p>

            <a class="cta-button" href="https://YOUR-BLOSSOM-TRAIL-LINK">
                Oubaitori Collective Blossom Trail
            </a>
        </div>

        <div class="right">
            <img src="logo.png" alt="Oubaitori Collective Logo" class="logo">
        </div>

    </div>
</body>

</html>
